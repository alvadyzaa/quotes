<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Generator V2</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Kalam:wght@300;400;700&family=Indie+Flower&family=Patrick+Hand&family=Shadows+Into+Light&family=Permanent+Marker&family=Handlee&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body {
      min-height:100vh;
      background:#e8e8e8;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:28px;
      font-family:'Inter',-apple-system,sans-serif;
      padding:40px 20px 60px;
    }

    /* nav tabs */
    .nav {
      display:flex;
      gap:8px;
      background:#fff;
      padding:6px;
      border-radius:14px;
      box-shadow:0 2px 12px rgba(0,0,0,0.08);
    }
    .nav a {
      padding:8px 20px;
      border-radius:10px;
      font-size:13px;
      font-weight:600;
      text-decoration:none;
      color:#888;
      transition:all .2s;
    }
    .nav a.active { background:#1a1a1a; color:#fff; }
    .nav a:hover:not(.active){ background:#f0f0f0; color:#333; }

    /* card preview */
    .canvas-wrapper{ width:540px; height:540px; }

    #quote-card {
      width:1080px;
      height:1080px;
      background:#111;
      position:relative;
      transform-origin:top left;
      transform:scale(0.5);
      overflow:hidden;
      border:1px solid #ccc;
    }

    .quote-body {
      position:absolute;
      top:50%;
      left:88px;
      right:88px;
      transform:translateY(-50%);
    }

    #card-title {
      font-size:48px;
      font-weight:600;
      color:#fff;
      letter-spacing:-0.5px;
      margin-bottom:48px;
      line-height:1.3;
    }
    #card-title:empty{ display:none; }

    #card-quote {
      font-size:60px;
      font-weight:400;
      line-height:1.45;
      color:#fff;
      letter-spacing:-0.5px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    #card-author {
      font-size:36px;
      font-weight:300;
      color:rgba(255,255,255,0.55);
      letter-spacing:0;
      margin-top:56px;
    }

    /* controls */
    .controls {
      background:#fff;
      border-radius:18px;
      padding:24px 28px;
      width:540px;
      box-shadow:0 2px 16px rgba(0,0,0,0.08);
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .controls-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .controls-header h2{ font-size:14px; font-weight:600; color:#111; }
    .version-badge {
      font-size:11px;
      font-weight:700;
      background:#111;
      color:#fff;
      padding:3px 8px;
      border-radius:6px;
      letter-spacing:.5px;
    }

    .field{ display:flex; flex-direction:column; gap:6px; }
    label { font-size:11px; font-weight:500; color:#999; text-transform:uppercase; letter-spacing:.5px; }

    textarea, input[type="text"], select {
      font-family:inherit;
      font-size:14px;
      border:1.5px solid #e8e8e8;
      border-radius:10px;
      padding:9px 13px;
      color:#111;
      resize:none;
      outline:none;
      transition:border-color .2s;
      background:#fafafa;
    }
    textarea:focus, input[type="text"]:focus, select:focus {
      border-color:#1a1a1a; background:#fff;
    }
    textarea{ height:88px; line-height:1.5; }
    select{ cursor:pointer; }

    /* formatting toolbar */
    .fmt-bar{ display:flex; gap:4px; flex-wrap:wrap; }
    .fmt-bar button {
      width:30px; height:28px;
      border:1.5px solid #e8e8e8;
      border-radius:7px;
      background:#fafafa;
      color:#333;
      font-family:inherit;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s;
      flex:none;
      padding:0;
    }
    .fmt-bar button.wide{ width:auto; padding:0 9px; font-size:11px; }
    .fmt-bar button:hover{ background:#eee; }
    .fmt-bar button.on{ background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

    /* alignment buttons */
    .align-bar{ display:flex; gap:4px; }
    .align-bar button {
      flex:1; height:32px;
      border:1.5px solid #e8e8e8;
      border-radius:8px;
      background:#fafafa;
      cursor:pointer;
      font-size:15px;
      transition:background .15s;
    }
    .align-bar button:hover{ background:#eee; }
    .align-bar button.on{ background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

    /* bg presets */
    .preset-row{ display:flex; gap:7px; flex-wrap:wrap; }
    .preset-swatch {
      width:30px; height:30px;
      border-radius:8px;
      cursor:pointer;
      border:2px solid transparent;
      transition:transform .15s, border-color .15s;
    }
    .preset-swatch:hover{ transform:scale(1.12); }
    .preset-swatch.on{ border-color:#555; }

    /* color row */
    .color-row{ display:flex; gap:10px; }
    .color-row .field{ flex:1; }
    input[type="color"] {
      width:100%; height:36px;
      border:1.5px solid #e8e8e8;
      border-radius:10px;
      cursor:pointer;
      padding:2px 4px;
      background:#fafafa;
    }

    /* font select */
    .two-col{ display:flex; gap:10px; }
    .two-col .field{ flex:1; }

    .btn-row{ display:flex; gap:10px; margin-top:2px; }
    .btn-row button {
      flex:1; padding:11px;
      border:none; border-radius:10px;
      font-family:inherit; font-size:14px; font-weight:600;
      cursor:pointer;
      transition:opacity .2s;
      width:auto; height:auto;
    }
    .btn-row button:hover{ opacity:.8; }
    #btn-dl{ background:#1a1a1a; color:#fff; }
    #btn-reset{ background:#f0f0f0; color:#555; }

    hr{ border:none; border-top:1px solid #f0f0f0; }
  </style>
</head>
<body>

  <!-- Nav -->
  <div class="nav">
    <a href="index.html">V1 — Simple</a>
    <a href="v2.html" class="active">V2 — Pro</a>
  </div>

  <!-- Preview -->
  <div class="canvas-wrapper">
    <div id="quote-card">
      <div class="quote-body">
        <p id="card-title">Self Reminder:</p>
        <p id="card-quote">Tulis quotes disini</p>
        <p id="card-author">— recausze</p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="controls-header">
      <h2>✦ Quote Generator</h2>
      <span class="version-badge">V2</span>
    </div>

    <hr/>

    <!-- Title -->
    <div class="field">
      <label>Judul / Kategori (opsional)</label>
      <input type="text" id="inp-title" value="Self Reminder:" placeholder="contoh: Self Reminder:"/>
    </div>

    <!-- Quote -->
    <div class="field">
      <label>Teks Quote</label>
      <div class="fmt-bar">
        <button id="fb" title="Bold"><b>B</b></button>
        <button id="fi" title="Italic"><i>I</i></button>
        <button id="fu" title="Underline"><u>U</u></button>
        <button id="fs" title="Strikethrough"><s>S</s></button>
        <button class="wide" id="fAA" title="UPPERCASE">AA</button>
        <button class="wide" id="faa" title="lowercase">aa</button>
      </div>
      <textarea id="inp-quote" spellcheck="false">Tulis quotes disini</textarea>
    </div>

    <!-- Author -->
    <div class="field">
      <label>Author</label>
      <input type="text" id="inp-author" value="— recausze" placeholder="— Nama"/>
    </div>

    <hr/>

    <!-- Font + Alignment -->
    <div class="two-col">
      <div class="field">
        <label>Font</label>
        <select id="sel-font">
          <option value="Caveat" selected>Caveat</option>
          <option value="Caveat" style="font-weight:700">Caveat Bold</option>
          <option value="Kalam">Kalam</option>
          <option value="Indie Flower">Indie Flower</option>
          <option value="Patrick Hand">Patrick Hand</option>
          <option value="Handlee">Handlee</option>
          <option value="Gloria Hallelujah">Gloria Hallelujah</option>
          <option value="Shadows Into Light">Shadows Into Light</option>
          <option value="Permanent Marker">Permanent Marker</option>
        </select>
      </div>
      <div class="field">
        <label>Alignment</label>
        <div class="align-bar">
          <button data-align="left"   title="Left">☰</button>
          <button data-align="center" title="Center">≡</button>
          <button data-align="right"  title="Right">≣</button>
        </div>
      </div>
    </div>

    <hr/>

    <!-- BG Presets -->
    <div class="field">
      <label>Background Preset</label>
      <div class="preset-row" id="preset-row">
        <div class="preset-swatch on" data-bg="#111111" data-text="#ffffff" data-author="rgba(255,255,255,0.55)" style="background:#111;border:2px solid #555;"></div>
        <div class="preset-swatch" data-bg="#ffffff" data-text="#1a1a1a" data-author="#888" style="background:#fff;border:2px solid #e0e0e0;"></div>
        <div class="preset-swatch" data-bg="#f5f0e8" data-text="#2c2415" data-author="#9c8a6e" style="background:#f5f0e8;"></div>
        <div class="preset-swatch" data-bg="#1a1a2e" data-text="#e0e0ff" data-author="rgba(200,200,255,0.55)" style="background:#1a1a2e;"></div>
        <div class="preset-swatch" data-bg="#2d4a22" data-text="#d4edda" data-author="rgba(200,240,200,0.6)" style="background:#2d4a22;"></div>
        <div class="preset-swatch" data-bg="#3b1f2b" data-text="#f5d6e0" data-author="rgba(240,190,210,0.6)" style="background:#3b1f2b;"></div>
        <div class="preset-swatch" data-bg="#1c2b3a" data-text="#cce8ff" data-author="rgba(180,220,255,0.55)" style="background:#1c2b3a;"></div>
        <div class="preset-swatch" data-bg="#2a2a2a" data-text="#f0f0f0" data-author="rgba(240,240,240,0.5)" style="background:#2a2a2a;"></div>
      </div>
    </div>

    <!-- Custom colors -->
    <div class="color-row">
      <div class="field">
        <label>BG Custom</label>
        <input type="color" id="c-bg" value="#111111"/>
      </div>
      <div class="field">
        <label>Quote</label>
        <input type="color" id="c-text" value="#ffffff"/>
      </div>
      <div class="field">
        <label>Author</label>
        <input type="color" id="c-author" value="#888888"/>
      </div>
      <div class="field">
        <label>Judul</label>
        <input type="color" id="c-title" value="#ffffff"/>
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-reset">↺ Reset</button>
      <button id="btn-dl">⬇ Download PNG</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const card       = document.getElementById('quote-card');
    const cardTitle  = document.getElementById('card-title');
    const cardQuote  = document.getElementById('card-quote');
    const cardAuthor = document.getElementById('card-author');

    const inpTitle   = document.getElementById('inp-title');
    const inpQuote   = document.getElementById('inp-quote');
    const inpAuthor  = document.getElementById('inp-author');
    const selFont    = document.getElementById('sel-font');
    const cBg        = document.getElementById('c-bg');
    const cText      = document.getElementById('c-text');
    const cAuthor    = document.getElementById('c-author');
    const cTitle     = document.getElementById('c-title');

    const MAX_FONT = 68, MIN_FONT = 26;

    // ── Formatting ──
    const fmt = { bold:false, italic:false, underline:false, strike:false };

    function applyFmt() {
      cardQuote.style.fontWeight     = fmt.bold    ? '700' : '400';
      cardQuote.style.fontStyle      = fmt.italic  ? 'italic' : 'normal';
      cardQuote.style.textDecoration = fmt.underline ? 'underline' : fmt.strike ? 'line-through' : 'none';
      cardTitle.style.fontStyle      = fmt.italic  ? 'italic' : 'normal';
    }

    function toggleFmt(key, id) {
      fmt[key] = !fmt[key];
      document.getElementById(id).classList.toggle('on', fmt[key]);
      applyFmt();
    }

    document.getElementById('fb').addEventListener('click', () => toggleFmt('bold','fb'));
    document.getElementById('fi').addEventListener('click', () => toggleFmt('italic','fi'));
    document.getElementById('fu').addEventListener('click', () => toggleFmt('underline','fu'));
    document.getElementById('fs').addEventListener('click', () => toggleFmt('strike','fs'));
    document.getElementById('fAA').addEventListener('click', () => { inpQuote.value = inpQuote.value.toUpperCase(); update(); });
    document.getElementById('faa').addEventListener('click', () => { inpQuote.value = inpQuote.value.toLowerCase(); update(); });

    // ── Alignment ──
    let currentAlign = 'left';
    document.querySelectorAll('.align-bar button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.align-bar button').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        currentAlign = btn.dataset.align;
        const qb = document.querySelector('.quote-body');
        cardQuote.style.textAlign  = currentAlign;
        cardTitle.style.textAlign  = currentAlign;
        cardAuthor.style.textAlign = currentAlign;
        if (currentAlign === 'center') {
          qb.style.left = '60px'; qb.style.right = '60px';
        } else if (currentAlign === 'right') {
          qb.style.left = '80px'; qb.style.right = '80px';
        } else {
          qb.style.left = '88px'; qb.style.right = '88px';
        }
      });
    });
    document.querySelectorAll('.align-bar button')[0].classList.add('on');

    // ── BG Presets ──
    document.querySelectorAll('.preset-swatch').forEach(sw => {
      sw.addEventListener('click', () => {
        document.querySelectorAll('.preset-swatch').forEach(s => s.classList.remove('on'));
        sw.classList.add('on');
        const bg     = sw.dataset.bg;
        const text   = sw.dataset.text;
        const author = sw.dataset.author;
        cBg.value    = bg.startsWith('rgba') ? '#888888' : bg;
        cText.value  = text.startsWith('rgba') ? '#ffffff' : text;
        cAuthor.value= author.startsWith('rgba') ? '#888888' : author;

        card.style.background     = bg;
        cardQuote.style.color     = text;
        cardAuthor.style.color    = author;
        cardTitle.style.color     = text;
        cTitle.value = text.startsWith('rgba') ? '#ffffff' : text;
      });
    });

    // ── Font ──
    selFont.addEventListener('change', () => {
      const f = `'${selFont.value}', serif`;
      cardQuote.style.fontFamily  = f;
      cardTitle.style.fontFamily  = f;
      cardAuthor.style.fontFamily = f;
    });
    // apply default font
    (function(){ const f = `'${selFont.value}', serif`; cardQuote.style.fontFamily = f; cardTitle.style.fontFamily = f; cardAuthor.style.fontFamily = f; })();

    // ── Auto-fit ──
    function autoFit() {
      cardQuote.style.fontSize = MAX_FONT + 'px';
      const titleH  = cardTitle.scrollHeight || 0;
      const authorH = 80;
      const gap     = 48 + 56; // title mb + author mt
      const budget  = 1080 * 0.78;
      let size = MAX_FONT;
      while (size > MIN_FONT) {
        cardQuote.style.fontSize = size + 'px';
        if (titleH + cardQuote.scrollHeight + authorH + gap <= budget) break;
        size -= 2;
      }
    }

    // ── Main update ──
    function update() {
      cardTitle.innerText  = inpTitle.value;
      cardQuote.innerText  = inpQuote.value   || 'Tulis quotes disini';
      cardAuthor.innerText = inpAuthor.value  || '— Nama';
      card.style.background   = cBg.value;
      cardQuote.style.color   = cText.value;
      cardAuthor.style.color  = cAuthor.value;
      cardTitle.style.color   = cTitle.value;
      applyFmt();
      autoFit();
    }

    [inpTitle, inpQuote, inpAuthor, cBg, cText, cAuthor, cTitle].forEach(el => el.addEventListener('input', update));

    // ── Reset ──
    document.getElementById('btn-reset').addEventListener('click', () => {
      inpTitle.value  = 'Self Reminder:';
      inpQuote.value  = 'Tulis quotes disini';
      inpAuthor.value = '— recausze';
      cBg.value    = '#111111'; cText.value = '#ffffff';
      cAuthor.value= '#888888'; cTitle.value= '#ffffff';
      Object.keys(fmt).forEach(k => { fmt[k]=false; });
      ['fb','fi','fu','fs'].forEach(id => document.getElementById(id).classList.remove('on'));
      document.querySelectorAll('.preset-swatch').forEach((s,i) => s.classList.toggle('on', i===0));
      update();
    });

    // ── Download (off-screen clone, no glitch) ──
    document.getElementById('btn-dl').addEventListener('click', () => {
      const clone = card.cloneNode(true);
      clone.style.transform = 'none';
      clone.style.position  = 'fixed';
      clone.style.top       = '-9999px';
      clone.style.left      = '-9999px';
      clone.style.border    = 'none';
      document.body.appendChild(clone);

      html2canvas(clone, {
        scale:1, width:1080, height:1080,
        useCORS:true, backgroundColor: cBg.value
      }).then(canvas => {
        document.body.removeChild(clone);
        const a = document.createElement('a');
        a.download = 'quote-v2.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    });

    // Init
    update();
  </script>
</body>
</html>
