<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f0f0f0"/>
  <title>Quote Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100%;
      min-height: -webkit-fill-available;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 20px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      padding: 24px 16px env(safe-area-inset-bottom, 24px);
      overflow-x: hidden;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      gap: 6px;
      background: #fff;
      padding: 5px;
      width: min(100%, 540px);
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      flex-shrink: 0;
    }
    .nav a {
      flex: 1;
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      color: #888;
      transition: all .2s;
      white-space: nowrap;
      text-align: center;
    }
    .nav a.active { background: #1a1a1a; color: #fff; }
    .nav a:hover:not(.active) { background: #f0f0f0; color: #333; }

    /* ── Card Preview — dynamic scale via JS ── */
    .canvas-wrapper {
      /* JS sets width & height */
      width: 100%;
      max-width: 540px;
      flex-shrink: 0;
      border-radius: 4px;
      overflow: hidden;
    }

    #quote-card {
      width: 1080px;
      height: 1080px;
      background: #fff;
      position: relative;
      transform-origin: top left;
      /* transform set by JS */
      overflow: hidden;
    }

    .quote-body {
      position: absolute;
      top: 50%;
      left: 80px;
      right: 80px;
      transform: translateY(-55%);
    }

    #card-quote {
      font-size: 68px;
      font-weight: 400;
      line-height: 1.35;
      color: #1a1a1a;
      letter-spacing: -1px;
      margin-bottom: 64px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #card-author {
      font-size: 38px;
      font-weight: 300;
      color: #555;
      letter-spacing: -0.3px;
    }
    #card-author:empty { display: none; }

    /* ── Controls ── */
    .controls {
      background: white;
      border-radius: 16px;
      padding: 20px 18px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .controls h2 {
      font-size: 14px;
      font-weight: 600;
      color: #111;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 11px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Formatting toolbar */
    .fmt-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .fmt-bar button {
      flex: none;
      min-width: 36px;
      height: 36px;
      border: 1.5px solid #e5e5e5;
      border-radius: 8px;
      background: #fafafa;
      color: #333;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      padding: 0 6px;
      touch-action: manipulation;
    }
    .fmt-bar button:hover { background: #eee; }
    .fmt-hint {
      font-size: 10.5px;
      color: #bbb;
      margin-top: 2px;
    }

    textarea, input[type="text"] {
      font-family: inherit;
      font-size: 16px; /* prevent iOS zoom */
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 10px 14px;
      color: #111;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      background: #fafafa;
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
    }
    textarea:focus, input[type="text"]:focus {
      border-color: #1a1a1a;
      background: #fff;
    }
    textarea { height: 95px; line-height: 1.5; }

    .color-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    input[type="color"] {
      width: 100%;
      height: 44px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      cursor: pointer;
      padding: 3px 5px;
      background: #fafafa;
      -webkit-appearance: none;
    }

    .btn-row { display: flex; gap: 10px; margin-top: 2px; }

    .btn-row button {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn-row button:hover { opacity: 0.8; }
    .btn-row button:active { transform: scale(0.97); }
    #btn-preview  { background: #1a1a1a; color: #fff; }
    #btn-download { background: #f0f0f0; color: #1a1a1a; }

    /* ── Responsive breakpoints ── */
    @media (max-width: 640px) {
      body { gap: 16px; padding: 16px 12px calc(env(safe-area-inset-bottom, 0px) + 16px); }
      .controls { padding: 16px 14px; }
      .btn-row { flex-direction: column; }
      .btn-row button { min-height: 46px; }
    }

    @media (max-width: 480px) {
      .nav a { padding-inline: 12px; }
      .color-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .color-row .field:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 400px) {
      .fmt-bar button {
        min-width: 34px;
        height: 34px;
      }
    }
  </style>
</head>
<body>

  <div class="nav">
    <a href="index.html" class="active">V1 — Simple</a>
    <a href="v2.html">V2 — Pro</a>
  </div>

  <!-- Card Preview -->
  <div class="canvas-wrapper" id="canvas-wrapper">
    <div id="quote-card">
      <div class="quote-body">
        <p id="card-quote">Tulis quotes disini</p>
        <p id="card-author"></p>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <h2>✦ Quote Generator</h2>

    <div class="field">
      <label>Teks Quote</label>
      <div class="fmt-bar">
        <button id="fmt-b" title="Bold — wrap pilihan teks dengan **"><b>B</b></button>
        <button id="fmt-i" title="Italic — wrap pilihan teks dengan *"><i>I</i></button>
        <button id="fmt-u" title="Underline — wrap pilihan teks dengan _"><u>U</u></button>
        <button id="fmt-s" title="Strikethrough — wrap pilihan teks dengan ~~"><s>S</s></button>
        <button id="fmt-caps" title="UPPERCASE">AA</button>
        <button id="fmt-lower" title="lowercase">aa</button>
      </div>
      <div class="fmt-hint">Pilih kata → klik B/I/U/S untuk format per kata</div>
      <textarea id="inp-quote" spellcheck="false">Tulis quotes disini</textarea>
    </div>

    <div class="field">
      <label>Nama / Author</label>
      <input type="text" id="inp-author" value="" placeholder="Opsional, boleh kosong" />
    </div>

    <div class="color-row">
      <div class="field">
        <label>Background</label>
        <input type="color" id="inp-bg" value="#ffffff" />
      </div>
      <div class="field">
        <label>Quote</label>
        <input type="color" id="inp-text" value="#1a1a1a" />
      </div>
      <div class="field">
        <label>Author</label>
        <input type="color" id="inp-ac" value="#555555" />
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-preview">Preview</button>
      <button id="btn-download">⬇ Download PNG</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    const card      = document.getElementById('quote-card');
    const wrapper   = document.getElementById('canvas-wrapper');
    const cardQuote = document.getElementById('card-quote');
    const cardAuthor= document.getElementById('card-author');
    const inpQuote  = document.getElementById('inp-quote');
    const inpAuthor = document.getElementById('inp-author');
    const inpBg     = document.getElementById('inp-bg');
    const inpText   = document.getElementById('inp-text');
    const inpAc     = document.getElementById('inp-ac');

    const MAX_FONT = 68, MIN_FONT = 28;

    // ── Dynamic scale ──
    function scaleCard() {
      const bodyStyles = getComputedStyle(document.body);
      const horizontalPadding = parseFloat(bodyStyles.paddingLeft) + parseFloat(bodyStyles.paddingRight);
      const maxW = Math.min(Math.max(document.documentElement.clientWidth - horizontalPadding, 280), 540);
      const scale = maxW / 1080;
      wrapper.style.width  = (1080 * scale) + 'px';
      wrapper.style.height = (1080 * scale) + 'px';
      card.style.transform = `scale(${scale})`;
    }
    scaleCard();
    window.addEventListener('resize', scaleCard);

    // ── Inline wrap helper ──
    function wrapSelection(open, close) {
      const start = inpQuote.selectionStart;
      const end   = inpQuote.selectionEnd;
      if (start === end) return; // nothing selected
      const val = inpQuote.value;
      inpQuote.value = val.slice(0, start) + open + val.slice(start, end) + close + val.slice(end);
      inpQuote.focus();
      inpQuote.setSelectionRange(start + open.length, end + open.length);
      update();
    }

    document.getElementById('fmt-b').addEventListener('mousedown', e => e.preventDefault());
    document.getElementById('fmt-i').addEventListener('mousedown', e => e.preventDefault());
    document.getElementById('fmt-u').addEventListener('mousedown', e => e.preventDefault());
    document.getElementById('fmt-s').addEventListener('mousedown', e => e.preventDefault());

    document.getElementById('fmt-b').addEventListener('click', () => wrapSelection('**', '**'));
    document.getElementById('fmt-i').addEventListener('click', () => wrapSelection('*', '*'));
    document.getElementById('fmt-u').addEventListener('click', () => wrapSelection('_', '_'));
    document.getElementById('fmt-s').addEventListener('click', () => wrapSelection('~~', '~~'));

    document.getElementById('fmt-caps').addEventListener('click', () => {
      inpQuote.value = inpQuote.value.toUpperCase();
      update();
    });
    document.getElementById('fmt-lower').addEventListener('click', () => {
      inpQuote.value = inpQuote.value.toLowerCase();
      update();
    });

    // ── Markdown → HTML ──
    function parseMarkdown(text) {
      // escape HTML first
      let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // order matters: bold before italic
      s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/\*(.*?)\*/g,     '<em>$1</em>');
      s = s.replace(/_(.*?)_/g,       '<u>$1</u>');
      s = s.replace(/~~(.*?)~~/g,     '<s>$1</s>');
      // newlines
      s = s.replace(/\n/g, '<br>');
      return s;
    }

    // ── Auto-fit font size ──
    function autoFitFont() {
      cardQuote.style.fontSize = MAX_FONT + 'px';
      const budget = 1080 * 0.72;
      const hasAuthor = cardAuthor.textContent.trim().length > 0;
      const authorHeight = hasAuthor ? cardAuthor.scrollHeight : 0;
      const authorGap = hasAuthor ? 64 : 0;
      let size = MAX_FONT;
      while (size > MIN_FONT) {
        cardQuote.style.fontSize = size + 'px';
        if (cardQuote.scrollHeight + authorHeight + authorGap <= budget) break;
        size -= 2;
      }
    }

    function update() {
      const raw = inpQuote.value || 'Tulis quotes disini';
      const author = inpAuthor.value.trim();
      cardQuote.innerHTML  = parseMarkdown(raw);
      cardAuthor.innerText = author;
      cardAuthor.style.display = author ? 'block' : 'none';
      card.style.background   = inpBg.value;
      cardQuote.style.color   = inpText.value;
      cardAuthor.style.color  = inpAc.value;
      autoFitFont();
    }

    [inpQuote, inpAuthor, inpBg, inpText, inpAc].forEach(el => el.addEventListener('input', update));
    document.getElementById('btn-preview').addEventListener('click', update);

    // ── Download — off-screen clone ──
    document.getElementById('btn-download').addEventListener('click', () => {
      const clone = card.cloneNode(true);
      clone.style.transform = 'none';
      clone.style.position  = 'fixed';
      clone.style.top       = '-9999px';
      clone.style.left      = '-9999px';
      clone.style.border    = 'none';
      document.body.appendChild(clone);

      html2canvas(clone, {
        scale: 1,
        width: 1080,
        height: 1080,
        useCORS: true,
        backgroundColor: inpBg.value
      }).then(canvas => {
        document.body.removeChild(clone);
        const a = document.createElement('a');
        a.download = 'quote.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      });
    });

    update();
  </script>
</body>
</html>
